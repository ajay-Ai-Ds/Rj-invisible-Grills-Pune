<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="100%" height="100%">
  <!-- Background -->
  <rect width="360" height="80" fill="#FFFFFF" />

  <!-- Horizontal Lockup Group -->
  <g transform="translate(16, 16)">
    <!-- Icon (left, 48x48) -->
    <g transform="translate(0, 0)">
      <!-- House/Window Outer Outline -->
      <path 
        d="M 6 16 L 24 4 L 42 16 L 42 42 C 42 43.1 41.1 44 40 44 L 8 44 C 6.9 44 6 43.1 6 42 Z" 
        fill="none" 
        stroke="#0F2747" 
        stroke-width="2.5" 
        stroke-linejoin="round" 
      />
      <!-- Thin Vertical Grill Wires -->
      <line x1="18" y1="12" x2="18" y2="44" stroke="#0F2747" stroke-width="0.8" opacity="0.3" />
      <line x1="24" y1="4" x2="24" y2="44" stroke="#0F2747" stroke-width="0.8" opacity="0.3" />
      <line x1="30" y1="12" x2="30" y2="44" stroke="#0F2747" stroke-width="0.8" opacity="0.3" />
      
      <!-- Letter R -->
      <path d="M 13 18 L 13 36" stroke="#0F2747" stroke-width="3" stroke-linecap="round" />
      <path d="M 13 18 H 18 C 21 18 21 26 18 26 H 13" stroke="#0F2747" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 16 26 L 21 36" stroke="#0F2747" stroke-width="3" stroke-linecap="round" />
      
      <!-- Letter J -->
      <path d="M 31 18 V 32 C 31 35 29 37 26 37 C 24 37 23 35 23 33" stroke="#0F2747" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      
      <!-- Sports Net detail in bottom right -->
      <path d="M 28 32 C 28 40, 36 44, 42 42" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" />
      <path d="M 30 36 L 36 43 M 34 33 L 41 40 M 34 43 L 28 36 M 40 42 L 32 34" stroke="#F97316" stroke-width="0.8" opacity="0.8" />
      
      <!-- Cricket Ball Accent -->
      <circle cx="36" cy="38" r="2.5" fill="#F97316" />
    </g>

    <!-- Wordmark (right, vertically centered) -->
    <g transform="translate(60, 0)">
      <!-- RJ (Accent Orange) -->
      <text 
        x="0" 
        y="32" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-weight="800" 
        font-size="24" 
        fill="#F97316" 
        letter-spacing="-0.02em"
      >RJ</text>
      <!-- Invisible Grills (Navy Blue) -->
      <text 
        x="34" 
        y="32" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-weight="800" 
        font-size="24" 
        fill="#0F2747" 
        letter-spacing="-0.02em"
      > Invisible Grills</text>
      <!-- Subtitle -->
      <text 
        x="0" 
        y="45" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-weight="600" 
        font-size="9" 
        fill="#64748B" 
        letter-spacing="0.25em"
      >PREMIUM INVISIBLE GRILLS &amp; NETS</text>
    </g>
  </g>
</svg>
